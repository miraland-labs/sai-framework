# SAI Framework Evaluation Report Schema (v0.2)
# Copy this template and fill in values for publication.
# See SPEC.md, BENCHMARK_GUIDE.md, and MEASUREMENT_PROTOCOL.md for field definitions.

schema_version: "0.2"

metadata:
  report_id: ""                    # UUID or unique identifier
  evaluator: ""                    # Organization or individual name
  evaluation_date: ""              # ISO 8601 date, e.g. 2026-07-07
  spec_version: "0.2"
  conformance_level: ""            # sai-basic | sai-full
  workload_category: ""              # general | coding | scientific | agentic

model:
  id: ""                           # e.g. meta-llama/Llama-3.1-8B-Instruct
  revision: ""                     # Git commit or HF revision hash
  parameters: ""                   # e.g. 8B
  format: ""                       # FP16, AWQ 4-bit, etc.
  provider: ""                     # self-hosted | nvidia-api | openai | etc.

environment:
  hardware:
    gpu: ""
    cpu: ""
    ram: ""
    storage: ""
    location: ""                   # Region or facility
  software:
    inference_framework: ""
    cuda_version: ""
    driver_version: ""
    os: ""

inference_config:
  temperature: 0.0
  top_p: 1.0
  top_k: -1
  max_tokens: 2048
  seed: 42
  batch_size: 1
  num_beams: 1
  repetition_penalty: 1.0

benchmark_config:
  prompt_format: model_specific
  few_shot_examples: 5
  timeout_seconds: 120
  retry_policy: none
  judge_model: gpt-4o-2024-05-13
  judge_temperature: 0.0
  judge_seed: 42
  livecodebench_version: ""        # e.g. LiveCodeBench-2026-07

benchmarks:
  # Raw scores (native scale); omit unavailable benchmarks
  mmlu_pro:
    version: "12k-2024"
    raw_score: null                # percent accuracy
    normalized_score: null
    weight: null
    tokens_input: null
    tokens_output: null
  gpqa_diamond:
    version: "448"
    raw_score: null
    normalized_score: null
    weight: null
    tokens_input: null
    tokens_output: null
  math_500:
    version: "hendrycks-500"
    raw_score: null
    normalized_score: null
    weight: null
    tokens_input: null
    tokens_output: null
  aime:
    version: "2023-2024"
    raw_score: null
    normalized_score: null
    weight: null
    tokens_input: null
    tokens_output: null
  humaneval_plus:
    version: "v0.2.0"
    raw_score: null
    normalized_score: null
    weight: null
    tokens_input: null
    tokens_output: null
  swe_bench:
    version: "verified-500"
    raw_score: null
    normalized_score: null
    weight: null
    tokens_input: null
    tokens_output: null
  livecodebench:
    version: ""
    raw_score: null
    normalized_score: null
    weight: null
    tokens_input: null
    tokens_output: null
  ifeval:
    version: "v1.0"
    raw_score: null
    normalized_score: null
    weight: null
    tokens_input: null
    tokens_output: null
  mt_bench:
    version: "v1.0"
    raw_score: null                # 0-10 judge score
    normalized_score: null
    weight: null
    tokens_input: null
    tokens_output: null

coverage:
  weight_available: null             # 0.0-1.0 fraction of category weight
  benchmarks_missing: []           # list of omitted benchmark keys

tokens:
  total_input: null
  total_output: null
  total_reasoning: null              # CoT tokens if reported separately
  total: null
  baseline_model: gpt-3.5-turbo-0125
  baseline_total: null

energy_measurement:
  tier: null                         # 1 | 2 | 3
  tool: ""                           # nvidia-smi | pynvml | TokenPowerBench | literature
  sampling_rate_hz: null
  num_runs: null
  baseline_power_w: null
  total_energy_joules: null
  pue: 1.3
  pue_source: ""                     # measured | default-cloud | default-onprem
  total_energy_with_pue: null
  confidence: ""                     # e.g. ±2%
  phase_breakdown:                   # Required for SAI-Full Tier 1
    prefill_energy_j: null
    decode_energy_j: null
  energy_source: ""                  # Required for Tier 2/3 citation

carbon_footprint:                    # Optional
  energy_kwh: null
  grid_intensity_gco2_per_kwh: null
  grid_intensity_source: ""
  total_gco2: null

results:
  y_score: null
  y_confidence_interval: ""          # e.g. 50.87 ± 1.2 (95% CI)
  x_norm: null
  x_confidence_interval: ""
  z_score: null                      # IP/J
  z_confidence_interval: ""
  sii: null
  sii_confidence_interval: ""
  sii_interpretation: ""             # exceptional | excellent | good | moderate | poor

reproducibility:
  methodology_url: ""
  code_repository: ""
  prompt_verification:               # one of: full_prompts | cryptographic_hashes
    method: ""
    merkle_root: ""
    prompt_hashes: []                # SHA-256 per prompt or dataset
  third_party_verification_available: false

conformance_checklist:
  benchmark_coverage_met: false
  energy_tier_met: false
  environment_disclosed: false
  inference_config_documented: false
  results_within_60_days: false
  statistical_reporting: false
  phase_aware_energy: false          # SAI-Full only
  cross_category_evaluation: false   # SAI-Full only
  reproducibility_package: false     # SAI-Full only

notes: ""
